minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--output-format=full]
        types_or: [python, pyi]
      - id: ruff-format
        args: [--check]
        types_or: [python, pyi]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: prettier-check
        name: prettier (check)
        entry: npm exec -- prettier --check
        language: system
        files: \.(?:[cm]?[jt]sx?)$

      - id: eslint
        name: eslint
        entry: npm exec -- eslint --max-warnings=0
        language: system
        files: \.(?:[cm]?[jt]sx?)$

      - id: forbid-temporary-markers
        name: forbid temporary markers
        entry: TO(DO-DELETE)|FIX(ME-ME)|XX(X-TEMP)|DEBUG-(ONLY)
        language: pygrep
        types: [text]
