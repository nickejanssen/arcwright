name: Verify Roadmap Tasks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest

      - name: Run lint
        run: make lint

      - name: Run type checks
        run: make type

      - name: Run tests
        run: make test

      - name: Verify M1 artifacts
        run: python scripts/verify_tasks.py --milestone M1
