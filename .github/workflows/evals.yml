name: Evals

on:
  pull_request:
    paths:
      - "evals/**"
      - "config/routing_table.json"
      - "engine/routing/**"
      - "**/*prompt*"
      - "**/prompts/**"
      - ".github/workflows/evals.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    name: Run eval harness
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run eval suite
        id: run_evals
        continue-on-error: true
        run: |
          pytest evals/runners/test_routing_evals.py -q | tee evals/reports/pytest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Build eval summary
        if: always()
        id: summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("evals/reports/routing_eval_report.json")
          if report_path.exists():
              report = json.loads(report_path.read_text())
              passed = report.get("passed", 0)
              failed = report.get("failed", 0)
              lines = [
                  "## Eval Summary",
                  "",
                  f"- Passed cases: {passed}",
                  f"- Failed cases: {failed}",
                  "",
                  "The eval workflow is report-only for now and does not block merge.",
              ]
              for result in report.get("results", []):
                  status = "PASS" if result.get("passed") else "FAIL"
                  lines.append(f"- `{result['case_id']}`: {status}")
              summary = "\n".join(lines)
          else:
              summary = "\n".join(
                  [
                      "## Eval Summary",
                      "",
                      "- No structured eval report was produced.",
                      "- Check the workflow logs for details.",
                      "",
                      "The eval workflow is report-only for now and does not block merge.",
                  ]
              )

          Path("evals/reports/pr-comment.md").write_text(summary)
          with open(Path("evals/reports/pr-comment.md"), "r", encoding="utf-8") as handle:
              print(handle.read())
          PY

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/reports/

      - name: Add workflow summary
        if: always()
        run: cat evals/reports/pr-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("evals/reports/pr-comment.md", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
