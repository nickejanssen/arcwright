name = "nightcap-web"
main = "src/worker.ts"
compatibility_date = "2026-06-22"

[vars]
# Intentional placeholder — override via Cloudflare dashboard or `wrangler secret` before deployment.
ARCWRIGHT_API_BASE_URL = "https://arcwright.invalid"
FIREBASE_SIGN_IN_URL = "https://identitytoolkit.googleapis.com/v1/accounts:signInWithCustomToken"
# Public Firebase client config (not secret — Firebase web config is designed
# to be embedded in browser clients). The identity project stays
# arcwright-53ea3 regardless of which GCP project hosts Cloud Run.
FIREBASE_AUTH_DOMAIN = "arcwright-53ea3.firebaseapp.com"
FIREBASE_PROJECT_ID = "arcwright-53ea3"
# Comma-separated Firebase test phone numbers the host page's phone
# sign-in accepts, enforced client-side. Not secret. Set your configured
# Firebase console test number(s) here or via `wrangler secret put` if you
# prefer not to commit even test numbers.
ALLOWED_TEST_PHONE_NUMBERS = ""

[assets]
directory = "./dist/static"
binding = "ASSETS"
# /mini-games.js and /mini-games/definitions/<id>/<version>.json are produced
# by scripts/discover-mini-games.mjs. The URL path maps 1:1 to the file path
# inside the directory above; do not add an extra /static/ prefix to script
# tags or fetch URLs or the asset binding will look for dist/static/static/*.

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "NightcapRoom"

# [[migrations]] is a top-level config that applies to all environments.
# Do not re-declare it under [env.production] or any other env block;
# doing so would register the migration a second time.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["NightcapRoom"]

[env.production]
name = "nightcap-web-prod"
workers_dev = true
# Intentional placeholder — this repo is public; do not commit the real
# rehearsal/production hostname. Add your own custom_domain route locally
# (not tracked) before deploying, e.g.:
#   routes = [{ pattern = "your-hostname.example.com", custom_domain = true }]
# The already-deployed rehearsal Worker keeps its live custom domain route
# until it is explicitly changed via `wrangler deploy` with that route
# present, or removed via the Cloudflare dashboard.
# Set with `wrangler secret put <NAME> --env production`:
#   ARCWRIGHT_API_KEY               server-side Arcwright API key
#   FIREBASE_WEB_API_KEY            referrer-restricted browser key (client Firebase config)
#   FIREBASE_TOKEN_EXCHANGE_API_KEY unrestricted, Identity-Toolkit-only key —
#                                    server-side custom-token exchange ONLY,
#                                    never sent to the browser
# ARCWRIGHT_API_BASE_URL is also set as a secret so it isn't tied to [vars].

  [env.production.vars]
  FIREBASE_SIGN_IN_URL = "https://identitytoolkit.googleapis.com/v1/accounts:signInWithCustomToken"
  FIREBASE_AUTH_DOMAIN = "arcwright-53ea3.firebaseapp.com"
  FIREBASE_PROJECT_ID = "arcwright-53ea3"
  # Set to your configured Firebase console test number(s), comma-separated.
  ALLOWED_TEST_PHONE_NUMBERS = ""

  [[env.production.durable_objects.bindings]]
  name = "ROOMS"
  class_name = "NightcapRoom"
